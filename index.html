<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PlatoX – مجتمع اللاعبين العرب</title> <link rel="icon" type="image/png" href="platox.png" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #a855f7;
      --magenta: #d946ef;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Tajawal', sans-serif;
      color: #fff;
    }

   
    .spline-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;

      will-change: transform;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      contain: strict;
      isolation: isolate;
    }

    .spline-bg iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;

      /* Same GPU layer hints on the iframe element itself */
      will-change: transform;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;

      /* Start invisible — fades in once loaded to avoid the white flash/glitch */
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    /* When iframe has loaded, JS adds this class to fade it in smoothly */
    .spline-bg iframe.loaded {
      opacity: 1;
    }

    /* ── Loading pulse (shown while Spline loads) ── */
    .spline-loader {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at 60% 40%, #1a0033 0%, #000 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease 0.3s;
      pointer-events: none;
    }

    .spline-loader.hidden {
      opacity: 0;
    }

    .loader-ring {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(168, 85, 247, 0.2);
      border-top-color: var(--purple);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Page ─────────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      /*
        isolation: isolate keeps the page content on its own compositing layer
        so it doesn't repaint when the Spline iframe animates beneath it
      */
      isolation: isolate;
    }

    /* ── NAV ──────────────────────────────────── */
    nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      /*
        Use a solid-ish background instead of heavy backdrop-filter blur —
        backdrop-filter is a GPU-expensive property that can cause stuttering
        when combined with an animated iframe below it.
        We fake the frosted look with a semi-transparent bg + very light blur.
      */
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
      /* Keep nav on its own layer so Spline repaints don't hit it */
      will-change: transform;
      transform: translateZ(0);
    }

    /* Logo — right side in RTL */
    .logo img {
      height: 60px;
      display: block;
      mix-blend-mode: lighten;
      filter: drop-shadow(0 0 14px rgba(168, 85, 247, .8));
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-direction: row-reverse;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255, 255, 255, .85);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      position: relative;
      transition: color .25s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; right: 0;
      width: 0; height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--magenta));
      transition: width .3s ease;
    }

    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after { width: 100%; }

    /* ── BUTTON ───────────────────────────────── */
    .btn-join {
      position: relative;
      padding: 12px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: .04em;
      color: #0a0014;
      overflow: hidden;
      outline: none;
      flex-shrink: 0;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: transform .4s cubic-bezier(.34, 1.56, .64, 1), box-shadow .4s ease;
      box-shadow: 0 0 22px rgba(168, 85, 247, .5);
      /* Promote button to its own layer to keep hover animations smooth */
      will-change: transform;
    }

    .btn-join::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%);
      z-index: 0;
    }

    .btn-join::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(255, 255, 255, 0) 30%,
        rgba(230, 215, 255, .9) 46%,
        rgba(255, 255, 255, 1) 52%,
        rgba(230, 215, 255, .9) 58%,
        rgba(255, 255, 255, 0) 70%,
        transparent 100%
      );
      background-size: 280% 100%;
      background-position: -140% 0;
      animation: shimmer 5s ease-in-out infinite;
      z-index: 1;
      border-radius: 50px;
    }

    @keyframes shimmer {
      0%        { background-position: -140% 0; }
      60%, 100% { background-position: 240% 0; }
    }

    .btn-join:hover {
      transform: scale(1.12);
      box-shadow: 0 0 40px rgba(168, 85, 247, .9), 0 0 80px rgba(217, 70, 239, .5);
    }

    .btn-join span { position: relative; z-index: 2; }

    /* ── HERO ─────────────────────────────────── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 24px 40px 40px;
      direction: rtl;
    }

    .hero-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .hero-logo img {
      width: min(60vw, 620px);
      height: auto;
      mix-blend-mode: lighten;
      filter: drop-shadow(0 0 30px rgba(168, 85, 247, .95))
              drop-shadow(0 0 60px rgba(217, 70, 239, .45));
      display: block;
      margin: 0 auto;
      /*
        Use transform for the bounce animation, NOT top/margin-top.
        transform is composited on the GPU and doesn't trigger layout reflow,
        making the animation buttery smooth even with the Spline bg running.
      */
      animation: bounce 5s ease-in-out infinite;
      /* Keeps the element on its own compositing layer during animation */
      will-change: transform;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30%       { transform: translateY(-18px); }
      60%       { transform: translateY(-8px); }
      80%       { transform: translateY(-14px); }
    }

    .hero-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--magenta));
      border-radius: 2px;
      margin: 0 auto;
    }

    .hero-title {
      font-size: clamp(1.6rem, 3.5vw, 3rem);
      font-weight: 900;
      line-height: 1.2;
      background: linear-gradient(135deg, #fff 30%, rgba(200, 160, 255, .85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      width: 100%;
      text-align: center;
    }

    .hero-sub {
      font-size: clamp(.95rem, 1.3vw, 1.2rem);
      font-weight: 700;
      color: rgba(255, 255, 255, .72);
      line-height: 1.85;
      max-width: 580px;
      text-align: center;
      margin: 0 auto;
    }

    /* ── MOBILE ───────────────────────────────── */
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        align-items: center;
        padding: 14px 20px 12px;
        gap: 12px;
      }

      .logo img { height: 48px; }

      .nav-left {
        width: 100%;
        justify-content: center;
        flex-direction: row;
        gap: 14px;
        flex-wrap: wrap;
      }

      .nav-links {
        gap: 16px;
        justify-content: center;
      }

      .nav-links a { font-size: .95rem; }
      .btn-join { padding: 9px 22px; font-size: .92rem; }

      .hero {
        gap: 16px;
        padding: 20px 20px 32px;
      }

      .hero-logo img { width: min(85vw, 360px); }
      .hero-title { font-size: clamp(1.3rem, 5.5vw, 1.9rem); }

      .hero-sub {
        font-size: clamp(.88rem, 3.5vw, 1rem);
        line-height: 1.7;
      }

      /*
        On mobile, backdrop-filter is especially expensive.
        Drop it entirely on weaker devices.
      */
      @media (prefers-reduced-motion: reduce) {
        nav {
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          background: rgba(0, 0, 0, 0.6);
        }
        .hero-logo img {
          animation: none;
        }
      }
    }

    @media (max-width: 400px) {
      .nav-links a { font-size: .82rem; }
      .nav-links { gap: 10px; }
      .logo img { height: 40px; }
      .btn-join { padding: 8px 16px; font-size: .85rem; }
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      .hero-logo img { animation: none; }
      .btn-join::after { animation: none; }
      .loader-ring { animation: none; border-top-color: var(--purple); }
    }
  </style>
</head>
<body>

  <!-- Loading screen shown while Spline iframe initialises -->
  <div class="spline-loader" id="splineLoader">
    <div class="loader-ring"></div>
  </div>

  <!-- Spline 3D background -->
  <div class="spline-bg">
    <!--
      KEY IFRAME OPTIMISATIONS:
      - loading="eager"            → starts fetching immediately (no lazy-load delay)
      - importance="high"          → browser prioritises this network request
      - allow="autoplay; fullscreen" → lets Spline run its WebGL loop unthrottled
      - We do NOT set scrolling="no" — it's deprecated and can trigger extra repaints
      - The onload JS fades the iframe in and removes the loader once Spline is ready
    -->
    <iframe
      id="splineFrame"
      src="https://my.spline.design/3dpathslines1copycopy-Y9XbL7clL8pevKge7dpVsQX3/"
      frameborder="0"
      width="100%"
      height="100%"
      loading="eager"
      importance="high"
      allow="autoplay; fullscreen"
      onload="handleSplineLoad()"
    ></iframe>
  </div>

  <div class="page">

    <!-- NAV: logo right, button+links left (RTL) -->
    <nav>
      <div class="logo">
        <img src="thisone.png" alt="PlatX Logo" />
      </div>
      <div class="nav-left">
        <a href="https://discord.gg/platoar" target="_blank" class="btn-join"><span>انضم الينا</span></a>
        <ul class="nav-links">
          <li><a href="#">فعاليات</a></li>
          <li><a href="#">اقتراحات</a></li>
          <li><a href="#">قادتنا</a></li>
        </ul>
      </div>
    </nav>

    <!-- HERO: everything centered -->
    <section class="hero">
      <div class="hero-logo">
        <img src="thisone.png" alt="PlatX" />
      </div>
      <div class="hero-divider"></div>
      <h1 class="hero-title">مجتمع اللاعبين العرب</h1>
      <p class="hero-sub">
        يلتقي فيه عشاق الألعاب ليعيشوا لحظات ممتعة،<br>
        يبنون صداقات حقيقية ويصنعون ذكريات تبقى للأبد.
      </p>
    </section>

  </div>

  <script>
    /*
      Smooth iframe reveal once Spline finishes loading.
      This prevents the white-flash glitch caused by the iframe
      becoming visible before WebGL has painted its first frame.
    */
    function handleSplineLoad() {
      var frame = document.getElementById('splineFrame');
      var loader = document.getElementById('splineLoader');

      /*
        Small delay lets Spline's WebGL context actually render its first frame
        before we reveal it — avoids the brief black/white flicker.
      */
      setTimeout(function () {
        frame.classList.add('loaded');
        loader.classList.add('hidden');

        /* Remove loader from DOM after its fade-out transition finishes */
        setTimeout(function () {
          loader.remove();
        }, 1400);
      }, 300);
    }

    /*
      Fallback: if the iframe fires no load event within 8 seconds
      (e.g. the Spline URL is slow), hide the loader anyway so
      the page isn't stuck on a spinner.
    */
    setTimeout(function () {
      var loader = document.getElementById('splineLoader');
      var frame  = document.getElementById('splineFrame');
      if (loader) {
        frame.classList.add('loaded');
        loader.classList.add('hidden');
        setTimeout(function () { loader.remove(); }, 1400);
      }
    }, 8000);
  </script>

</body>
</html>
