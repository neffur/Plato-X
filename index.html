<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PlatX – مجتمع اللاعبين العرب</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #a855f7;
      --magenta: #d946ef;
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Tajawal', sans-serif;
      color: #fff;
    }

    /* ── Spline BG ─────────────────────────────── */
    .spline-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .spline-bg iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ── Page ─────────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ──────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 3.5vw;
      width: 100%;
      /* subtle top glass bar like reference */
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo img {
      height: clamp(70px, 9vh, 110px);
      filter: drop-shadow(0 0 16px rgba(168,85,247,.8));
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: clamp(16px, 2vw, 36px);
      flex-direction: row-reverse;
    }

    .nav-links {
      display: flex;
      gap: clamp(20px, 2.5vw, 44px);
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,.82);
      text-decoration: none;
      font-weight: 700;
      position: relative;
    }

    .btn-join {
      padding: 12px 30px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--magenta));
      font-weight: 900;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: clamp(16px, 2.5vh, 32px);
      padding: 0 40px;
    }

    .hero-logo img {
      height: clamp(220px, 30vh, 400px);
      filter: drop-shadow(0 0 32px rgba(168,85,247,.95));
      margin-bottom: -10px; /* 🔥 closer to next element */
    }

    .hero-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--magenta));
    }

    .hero-title {
      font-size: clamp(1.6rem, 3.5vw, 3.2rem);
      font-weight: 900;
      margin-bottom: -6px; /* 🔥 tighter */
    }

    .hero-sub {
      font-size: clamp(.95rem, 1.4vw, 1.3rem);
      color: rgba(255,255,255,.72);
      line-height: 1.8;
      max-width: 600px;
      margin-top: -10px; /* 🔥 THIS is the main fix */
    }

  </style>
</head>
<body>

  <div class="spline-bg">
    <iframe src="https://my.spline.design/3dpathslines1copycopy-Y9XbL7clL8pevKge7dpVsQX3/"></iframe>
  </div>

  <div class="page">

    <nav>
      <div class="logo">
        <img src="logo.png" />
      </div>

      <div class="nav-left">
        <button class="btn-join">انضم الينا</button>

        <ul class="nav-links">
          <li><a href="#">فعاليات</a></li>
          <li><a href="#">اقتراحات</a></li>
          <li><a href="#">قادتنا</a></li>
        </ul>
      </div>
    </nav>

    <!-- HERO — centered, no card -->
    <section class="hero">

      <div class="hero-logo">
        <img src="logo.png" alt="PlatX" />
      </div>

      <div class="hero-divider"></div>

      <h1 class="hero-title">مجتمع اللاعبين العرب</h1>

      <p class="hero-sub">
        يلتقي فيه عشاق الألعاب ليعيشوا لحظات ممتعة،<br>
        يبنون صداقات حقيقية ويصنعون ذكريات تبقى للأبد.
      </p>

    </section>

  </div>

</body>
</html>
