<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PlatX – مجتمع اللاعبين العرب</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #a855f7;
      --magenta: #d946ef;
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Tajawal', sans-serif;
      color: #fff;
    }

    /* ── Spline BG ─────────────────────────────── */
    .spline-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .spline-bg iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ── Page ─────────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ──────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 3.5vw;
      width: 100%;
      /* subtle top glass bar like reference */
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Logo — visual RIGHT (RTL first child) */
    .logo img {
      height: clamp(70px, 12vh, 110px);
      display: block;
      filter: drop-shadow(0 0 16px rgba(168,85,247,.8));
    }

    /* Left group: button + links */
    .nav-left {
      display: flex;
      align-items: center;
      gap: clamp(16px, 2vw, 36px);
      flex-direction: row-reverse;
    }

    .nav-links {
      display: flex;
      gap: clamp(20px, 2.5vw, 44px);
      list-style: none;
    }
    .nav-links a {
      color: rgba(255,255,255,.82);
      text-decoration: none;
      font-size: clamp(.95rem, 1.1vw, 1.15rem);
      font-weight: 700;
      white-space: nowrap;
      position: relative;
      transition: color .25s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; right: 0;
      width: 0; height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--magenta));
      transition: width .3s ease;
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after { width: 100%; }

    /* ── BUTTON ───────────────────────────────── */
    .btn-join {
      position: relative;
      padding: clamp(10px, 1.2vh, 15px) clamp(24px, 2.4vw, 40px);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(.95rem, 1.05vw, 1.15rem);
      font-weight: 900;
      letter-spacing: .04em;
      color: #0a0014;
      overflow: hidden;
      outline: none;
      flex-shrink: 0;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .4s ease;
      box-shadow: 0 0 22px rgba(168,85,247,.5);
    }
    .btn-join::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%);
      z-index: 0;
      transition: opacity .4s;
    }
    .btn-join::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(255,255,255,0) 30%,
        rgba(230,215,255,.9) 46%,
        rgba(255,255,255,1) 52%,
        rgba(230,215,255,.9) 58%,
        rgba(255,255,255,0) 70%,
        transparent 100%
      );
      background-size: 280% 100%;
      background-position: -140% 0;
      animation: shimmer 5s ease-in-out infinite;
      z-index: 1;
      border-radius: 50px;
    }
    @keyframes shimmer {
      0%        { background-position: -140% 0; }
      60%, 100% { background-position: 240% 0; }
    }
    .btn-join:hover {
      transform: scale(1.12);
      box-shadow: 0 0 40px rgba(168,85,247,.9), 0 0 80px rgba(217,70,239,.5);
    }
    .btn-join:hover::before { opacity: .72; }
    .btn-join span { position: relative; z-index: 2; }

    /* ── HERO — centered like reference ──────── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: clamp(16px, 2.5vh, 32px);
      padding: 0 clamp(24px, 8vw, 160px) clamp(20px, 4vh, 60px);
    }

    /* Big centered logo */
    .hero-logo img {
      height: clamp(220px, 40vh, 400px);
      filter: drop-shadow(0 0 32px rgba(168,85,247,.95))
              drop-shadow(0 0 64px rgba(217,70,239,.5));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-8px); }
    }

    /* Main headline */
    .hero-title {
      font-size: clamp(1.6rem, 3.5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: .01em;
      line-height: 1.2;
      background: linear-gradient(135deg, #fff 30%, rgba(200,160,255,.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    /* Subtitle */
    .hero-sub {
      font-size: clamp(.95rem, 1.4vw, 1.3rem);
      font-weight: 700;
      color: rgba(255,255,255,.72);
      line-height: 1.8;
      max-width: 600px;
    }

    /* Thin divider line like reference */
    .hero-divider {
      width: clamp(40px, 6vw, 80px);
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--magenta));
      border-radius: 2px;
      opacity: .7;
    }
  </style>
</head>
<body>

  <div class="spline-bg">
    <iframe src="https://my.spline.design/3dpathslines1copycopy-Y9XbL7clL8pevKge7dpVsQX3/"
            frameborder="0" width="100%" height="100%" allowfullscreen></iframe>
  </div>

  <div class="page">

    <!-- NAV -->
    <nav>
      <div class="logo">
        <img src="logo.png" alt="PlatX Logo" />
      </div>
      <div class="nav-left">
        <button class="btn-join"><span>انضم الينا</span></button>
        <ul class="nav-links">
          <li><a href="#">فعاليات</a></li>
          <li><a href="#">اقتراحات</a></li>
          <li><a href="#">قادتنا</a></li>
        </ul>
      </div>
    </nav>

    <!-- HERO — centered, no card -->
    <section class="hero">
      <div class="hero-logo">
        <img src="logo.png" alt="PlatX" />
      </div>

      <div class="hero-divider"></div>

      <h1 class="hero-title">مجتمع اللاعبين العرب</h1>

      <p class="hero-sub">
        يلتقي فيه عشاق الألعاب ليعيشوا لحظات ممتعة،<br>
        يبنون صداقات حقيقية ويصنعون ذكريات تبقى للأبد.
      </p>
    </section>

  </div>

</body>
</html>
